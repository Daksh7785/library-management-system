# ============================================================
# AcademicOS — Development Profile (H2 In-Memory)
# Active when: spring.profiles.active=dev (default)
# ============================================================

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:academicosdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# H2 Dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Web Console (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Show SQL in dev
spring.jpa.show-sql=true

# DevTools live reload
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Verbose logging in dev
logging.level.com.academicos=DEBUG
logging.level.org.hibernate.SQL=DEBUG
