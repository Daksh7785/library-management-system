# ============================================================
# AcademicOS — Common Application Configuration
# Profile-specific settings are in:
#   application-dev.properties  (H2 in-memory, default)
#   application-prod.properties (PostgreSQL — NOT committed to VCS)
# ============================================================

# Active profile: override with -Dspring.profiles.active=prod
spring.profiles.active=dev

# Application info
spring.application.name=AcademicOS Library Management System

# Server
server.port=8080

# JPA Common settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Jackson — serialize LocalDate as ISO string
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Logging
logging.level.com.academicos=INFO
logging.level.org.springframework.security=WARN
