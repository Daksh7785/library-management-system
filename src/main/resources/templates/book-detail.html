<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AcademicOS - Book Detail</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #fff;
            display: flex;
        }
        .sidebar {
            width: 260px;
            height: 100vh;
            background: #090d16;
            border-right: 1px solid #1e293b;
            padding: 30px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: fixed;
        }
        .main-content {
            margin-left: 260px;
            padding: 40px;
            width: calc(100% - 260px);
            box-sizing: border-box;
            min-height: 100vh;
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 800;
            color: #fff;
            text-decoration: none;
            margin-bottom: 40px;
        }
        .logo-box {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }
        .nav-link:hover, .nav-link.active {
            background: rgba(139, 92, 246, 0.1);
            color: #8b5cf6;
        }
        .detail-container {
            display: flex;
            gap: 40px;
            margin-bottom: 40px;
        }
        .detail-cover {
            width: 300px;
            height: 440px;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.5);
            border: 1px solid #1e293b;
        }
        .detail-info {
            flex: 1;
        }
        .detail-info h1 {
            font-size: 36px;
            font-weight: 800;
            margin: 0 0 8px;
        }
        .detail-author {
            font-size: 18px;
            color: #8b5cf6;
            font-weight: 600;
            margin-bottom: 24px;
        }
        .detail-desc {
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .meta-tag {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid #1e293b;
            font-size: 13px;
            color: #e2e8f0;
            margin-right: 8px;
        }
        .btn-action {
            padding: 14px 28px;
            background: #8b5cf6;
            color: #fff;
            font-weight: 700;
            font-size: 15px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(139,92,246,0.3);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }
        .btn-action:hover {
            box-shadow: 0 12px 30px rgba(139,92,246,0.5);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div>
            <a href="/dashboard" class="nav-logo">
                <div class="logo-box">
                    <span class="material-symbols-outlined" style="font-size: 18px;">school</span>
                </div>
                <span>AcademicOS</span>
            </a>
            <div class="nav-links">
                <a th:href="@{/dashboard(userId=${profile.id})}" class="nav-link">
                    <span class="material-symbols-outlined">dashboard</span> Dashboard
                </a>
                <a th:href="@{/books(userId=${profile.id})}" class="nav-link active">
                    <span class="material-symbols-outlined">menu_book</span> Catalog
                </a>
                <a th:href="@{/profile(userId=${profile.id})}" class="nav-link">
                    <span class="material-symbols-outlined">person</span> My Profile
                </a>
            </div>
        </div>
        <div>
            <a href="/login" class="nav-link" style="color: #f87171;">
                <span class="material-symbols-outlined">logout</span> Sign Out
            </a>
        </div>
    </div>
    <div class="main-content">
        <div class="detail-container">
            <img th:src="${book.coverUrl}" class="detail-cover" alt="Cover">
            <div class="detail-info">
                <h1 th:text="${book.title}">Book Title</h1>
                <div class="detail-author" th:text="${book.author}">Author</div>
                
                <div style="margin-bottom: 24px;">
                    <span class="meta-tag" th:text="'Category: ' + ${book.category}">Category</span>
                    <span class="meta-tag" th:text="'Rating: ' + ${book.rating} + ' ★'">Rating</span>
                    <span class="meta-tag" th:text="'Pages: ' + ${book.totalPages}">Pages</span>
                </div>

                <p class="detail-desc" th:text="${book.description}">Synopsis</p>

                <div style="margin-top: 40px;">
                    <div th:if="${availableCount > 0}">
                        <form th:action="@{/api/action/borrow}" method="post">
                            <input type="hidden" name="bookId" th:value="${book.id}">
                            <input type="hidden" name="userId" th:value="${profile.id}">
                            <button type="submit" class="btn-action">
                                <span class="material-symbols-outlined">bookmark_add</span> Borrow this Volume
                            </button>
                        </form>
                    </div>
                    <div th:if="${availableCount == 0}">
                        <button class="btn-action" style="background: #475569; cursor: not-allowed; box-shadow: none;">
                            <span class="material-symbols-outlined">block</span> All Copies Checked Out
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
