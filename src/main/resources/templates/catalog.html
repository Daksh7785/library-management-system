<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AcademicOS - Catalog</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #fff;
            display: flex;
        }
        .sidebar {
            width: 260px;
            height: 100vh;
            background: #090d16;
            border-right: 1px solid #1e293b;
            padding: 30px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: fixed;
        }
        .main-content {
            margin-left: 260px;
            padding: 40px;
            width: calc(100% - 260px);
            box-sizing: border-box;
            min-height: 100vh;
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 800;
            color: #fff;
            text-decoration: none;
            margin-bottom: 40px;
        }
        .logo-box {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }
        .nav-link:hover, .nav-link.active {
            background: rgba(139, 92, 246, 0.1);
            color: #8b5cf6;
        }
        .search-container {
            max-width: 600px;
            margin-bottom: 40px;
            position: relative;
        }
        .search-input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid #334155;
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
        }
        .search-input:focus {
            border-color: #8b5cf6;
        }
        .grid-books {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 24px;
        }
        .book-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            color: #fff;
        }
        .book-card:hover {
            transform: translateY(-4px);
            border-color: #8b5cf6;
        }
        .book-card img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 12px;
        }
        .book-card h3 {
            font-size: 15px;
            margin: 0 0 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .book-card p {
            font-size: 12px;
            color: #64748b;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div>
            <a href="/dashboard" class="nav-logo">
                <div class="logo-box">
                    <span class="material-symbols-outlined" style="font-size: 18px;">school</span>
                </div>
                <span>AcademicOS</span>
            </a>
            <div class="nav-links">
                <a th:href="@{/dashboard(userId=${profile.id})}" class="nav-link">
                    <span class="material-symbols-outlined">dashboard</span> Dashboard
                </a>
                <a th:href="@{/books(userId=${profile.id})}" class="nav-link active">
                    <span class="material-symbols-outlined">menu_book</span> Catalog
                </a>
                <a th:href="@{/profile(userId=${profile.id})}" class="nav-link">
                    <span class="material-symbols-outlined">person</span> My Profile
                </a>
            </div>
        </div>
        <div>
            <a href="/login" class="nav-link" style="color: #f87171;">
                <span class="material-symbols-outlined">logout</span> Sign Out
            </a>
        </div>
    </div>
    <div class="main-content">
        <h2 style="font-size: 28px; font-weight: 800; margin-bottom: 24px;">Library Catalog</h2>

        <form th:action="@{/books}" method="get" class="search-container">
            <input type="hidden" name="userId" th:value="${profile.id}">
            <input type="text" name="q" th:value="${query}" class="search-input" placeholder="Search by title, author, or description...">
        </form>

        <div class="grid-books">
            <a th:each="book : ${books}" th:href="@{'/book/' + ${book.id}(userId=${profile.id})}" class="book-card">
                <img th:src="${book.coverUrl}" alt="Cover">
                <h3 th:text="${book.title}">Book Title</h3>
                <p th:text="${book.author}">Author</p>
                <div style="margin-top: 8px; font-size: 11px; color: #8b5cf6; font-weight: 700;" th:text="${book.category}">Category</div>
            </a>
        </div>
    </div>
</body>
</html>
