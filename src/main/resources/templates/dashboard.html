<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AcademicOS - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #fff;
            display: flex;
        }
        .sidebar {
            width: 260px;
            height: 100vh;
            background: #090d16;
            border-right: 1px solid #1e293b;
            padding: 30px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: fixed;
        }
        .main-content {
            margin-left: 260px;
            padding: 40px;
            width: calc(100% - 260px);
            box-sizing: border-box;
            min-height: 100vh;
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 800;
            color: #fff;
            text-decoration: none;
            margin-bottom: 40px;
        }
        .logo-box {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }
        .nav-link:hover, .nav-link.active {
            background: rgba(139, 92, 246, 0.1);
            color: #8b5cf6;
        }
        .hero {
            padding: 60px 40px;
            background: radial-gradient(ellipse at center, #1e1b4b 0%, #020617 70%);
            border-radius: 24px;
            border: 1px solid #1e293b;
            margin-bottom: 40px;
        }
        .hero h1 {
            font-size: 42px;
            font-weight: 900;
            margin: 0 0 10px;
        }
        .hero p {
            color: #64748b;
            font-size: 16px;
            margin: 0;
        }
        .section-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .grid-books {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 24px;
        }
        .book-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            color: #fff;
        }
        .book-card:hover {
            transform: translateY(-4px);
            border-color: #8b5cf6;
        }
        .book-card img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 12px;
        }
        .book-card h3 {
            font-size: 15px;
            margin: 0 0 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .book-card p {
            font-size: 12px;
            color: #64748b;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div>
            <a href="/dashboard" class="nav-logo">
                <div class="logo-box">
                    <span class="material-symbols-outlined" style="font-size: 18px;">school</span>
                </div>
                <span>AcademicOS</span>
            </a>
            <div class="nav-links">
                <a th:href="@{/dashboard(userId=${profile.id})}" class="nav-link active">
                    <span class="material-symbols-outlined">dashboard</span> Dashboard
                </a>
                <a th:href="@{/books(userId=${profile.id})}" class="nav-link">
                    <span class="material-symbols-outlined">menu_book</span> Catalog
                </a>
                <a th:href="@{/profile(userId=${profile.id})}" class="nav-link">
                    <span class="material-symbols-outlined">person</span> My Profile
                </a>
            </div>
        </div>
        <div>
            <a href="/login" class="nav-link" style="color: #f87171;">
                <span class="material-symbols-outlined">logout</span> Sign Out
            </a>
        </div>
    </div>
    <div class="main-content">
        <div class="hero">
            <h1>Welcome back, <span th:text="${profile.fullName}" style="background: linear-gradient(135deg, #8b5cf6, #0ea5e9); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Scholar</span></h1>
            <p th:text="${totalBooks + ' books in the library catalog'}">0 books in the library catalog</p>
        </div>

        <section>
            <div class="section-title">
                <span class="material-symbols-outlined" style="color: #8b5cf6">auto_awesome</span> Recommended for You
            </div>
            <div class="grid-books">
                <a th:each="book : ${recommendations}" th:href="@{'/book/' + ${book.id}(userId=${profile.id})}" class="book-card">
                    <img th:src="${book.coverUrl}" alt="Cover">
                    <h3 th:text="${book.title}">Book Title</h3>
                    <p th:text="${book.author}">Author</p>
                </a>
            </div>
        </section>
    </div>
</body>
</html>
