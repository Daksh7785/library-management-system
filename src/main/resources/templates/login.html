<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AcademicOS - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #fff;
            display: flex;
            min-height: 100vh;
        }
        .left-panel {
            width: 50%;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 48px;
            box-sizing: border-box;
        }
        .right-panel {
            width: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px;
            box-sizing: border-box;
        }
        .branding-header {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 800;
        }
        .logo-box {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(139,92,246,0.5);
        }
        .left-panel h1 {
            font-size: 56px;
            font-weight: 800;
            line-height: 1.1;
            margin: 40px 0 24px;
        }
        .left-panel p {
            font-size: 18px;
            color: #94a3b8;
            max-width: 400px;
        }
        .form-container {
            width: 100%;
            max-width: 420px;
        }
        .form-container h2 {
            font-size: 32px;
            margin-bottom: 8px;
        }
        .form-container p {
            color: #64748b;
            margin-bottom: 40px;
        }
        .btn-demo {
            width: 100%;
            padding: 14px;
            background: rgba(139,92,246,0.1);
            border: 1px solid rgba(139,92,246,0.3);
            border-radius: 12px;
            color: #8b5cf6;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 12px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-demo:hover {
            background: #8b5cf6;
            color: #fff;
            box-shadow: 0 8px 24px rgba(139,92,246,0.3);
        }
        .divider {
            position: relative;
            text-align: center;
            margin: 28px 0;
        }
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #334155;
            z-index: 1;
        }
        .divider span {
            position: relative;
            background: #0f172a;
            padding: 0 12px;
            color: #64748b;
            font-size: 12px;
            font-weight: 700;
            z-index: 2;
        }
    </style>
</head>
<body>
    <div class="left-panel">
        <div class="branding-header">
            <div class="logo-box">
                <span class="material-symbols-outlined">school</span>
            </div>
            <span>AcademicOS</span>
        </div>
        <div>
            <h1>The Global<br><span style="color: #8b5cf6">Academy.</span></h1>
            <p>A unified Java Spring ecosystem for students, teachers, and researchers to thrive through connected knowledge.</p>
        </div>
        <div style="color: #475569; font-size: 13px;">© 2026 AcademicOS Core</div>
    </div>
    <div class="right-panel">
        <div class="form-container">
            <h2>Portal Access</h2>
            <p>Enter your institutional credentials or bypass using demo modes.</p>
            
            <button class="btn-demo" onclick="location.href='/dashboard?userId=demo-student-id'">
                <span class="material-symbols-outlined">person</span> Enter as Demo Student
            </button>
            <button class="btn-demo" onclick="location.href='/dashboard?userId=demo-teacher-id'">
                <span class="material-symbols-outlined">school</span> Enter as Demo Teacher
            </button>
            <button class="btn-demo" onclick="location.href='/dashboard?userId=demo-admin-id'" style="background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.3); color: #10b981;">
                <span class="material-symbols-outlined">admin_panel_settings</span> Enter as System Admin
            </button>
        </div>
    </div>
</body>
</html>
