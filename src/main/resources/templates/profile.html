<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AcademicOS - Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #fff;
            display: flex;
        }
        .sidebar {
            width: 260px;
            height: 100vh;
            background: #090d16;
            border-right: 1px solid #1e293b;
            padding: 30px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: fixed;
        }
        .main-content {
            margin-left: 260px;
            padding: 40px;
            width: calc(100% - 260px);
            box-sizing: border-box;
            min-height: 100vh;
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 800;
            color: #fff;
            text-decoration: none;
            margin-bottom: 40px;
        }
        .logo-box {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }
        .nav-link:hover, .nav-link.active {
            background: rgba(139, 92, 246, 0.1);
            color: #8b5cf6;
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 24px;
            background: rgba(255,255,255,0.02);
            border: 1px solid #1e293b;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 40px;
        }
        .avatar-placeholder {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #0ea5e9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 800;
        }
        .profile-details h1 {
            font-size: 28px;
            margin: 0 0 6px;
        }
        .profile-details p {
            color: #64748b;
            margin: 0;
        }
        .loan-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.01);
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .loan-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .loan-info img {
            width: 50px;
            height: 70px;
            object-fit: cover;
            border-radius: 6px;
        }
        .btn-return {
            padding: 10px 20px;
            background: rgba(248,113,113,0.1);
            border: 1px solid rgba(248,113,113,0.3);
            border-radius: 10px;
            color: #f87171;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-return:hover {
            background: #f87171;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div>
            <a href="/dashboard" class="nav-logo">
                <div class="logo-box">
                    <span class="material-symbols-outlined" style="font-size: 18px;">school</span>
                </div>
                <span>AcademicOS</span>
            </a>
            <div class="nav-links">
                <a th:href="@{/dashboard(userId=${profile.id})}" class="nav-link">
                    <span class="material-symbols-outlined">dashboard</span> Dashboard
                </a>
                <a th:href="@{/books(userId=${profile.id})}" class="nav-link">
                    <span class="material-symbols-outlined">menu_book</span> Catalog
                </a>
                <a th:href="@{/profile(userId=${profile.id})}" class="nav-link active">
                    <span class="material-symbols-outlined">person</span> My Profile
                </a>
            </div>
        </div>
        <div>
            <a href="/login" class="nav-link" style="color: #f87171;">
                <span class="material-symbols-outlined">logout</span> Sign Out
            </a>
        </div>
    </div>
    <div class="main-content">
        <div class="profile-header">
            <div class="avatar-placeholder" th:text="${#strings.substring(profile.fullName, 0, 1)}">S</div>
            <div class="profile-details">
                <h1 th:text="${profile.fullName}">Patron Name</h1>
                <p th:text="${profile.email}">email@university.edu</p>
                <div style="margin-top: 10px;">
                    <span style="font-size: 13px; color: #8b5cf6; font-weight: 700; background: rgba(139,92,246,0.1); padding: 4px 10px; border-radius: 6px;" th:text="${profile.xp + ' XP'}">0 XP</span>
                </div>
            </div>
        </div>

        <section>
            <h2 style="font-size: 20px; font-weight: 800; margin-bottom: 20px;">Current Loans</h2>
            <div th:if="${#lists.isEmpty(loans)}" style="color: #64748b; padding: 20px; background: rgba(255,255,255,0.01); border: 1px dashed #1e293b; border-radius: 12px; text-align: center;">
                No active loans. Go check out a book from the catalog!
            </div>
            <div th:each="loan : ${loans}" class="loan-card">
                <div class="loan-info">
                    <img th:src="${loan.book.coverUrl}" alt="Cover">
                    <div>
                        <h3 th:text="${loan.book.title}" style="margin: 0 0 4px; font-size: 16px;">Book Title</h3>
                        <p th:text="${loan.book.author}" style="margin: 0 0 6px; font-size: 13px; color: #8b5cf6;">Author</p>
                        <p style="margin: 0; font-size: 11px; color: #64748b;" th:text="'Due Date: ' + ${loan.tx.dueDate}">Due Date</p>
                    </div>
                </div>
                <div th:if="${'issued'.equals(loan.tx.status)}">
                    <form th:action="@{/api/action/return}" method="post">
                        <input type="hidden" name="transactionId" th:value="${loan.tx.id}">
                        <input type="hidden" name="userId" th:value="${profile.id}">
                        <button type="submit" class="btn-return">Return Book</button>
                    </form>
                </div>
                <div th:if="${'returned'.equals(loan.tx.status)}">
                    <span style="font-size: 13px; color: #10b981; font-weight: 700;">Returned</span>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
